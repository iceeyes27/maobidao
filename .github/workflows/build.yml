name: Refresh archive cache (manual)

on:
  # Auto-build is disabled: Cloudflare Pages is the sole builder and deploys
  # on every push. This workflow is kept manual-only to regenerate and commit
  # the article cache (data/articles-cache.json) when it needs refreshing.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static site
        run: python scripts/wechat_to_site.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public data urls.txt
          git diff --cached --quiet || git commit -m "Update archive site"
          git push
