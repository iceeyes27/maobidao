name: Build WeChat Archive Site

on:
  push:
    branches:
      - main
    paths:
      - "scripts/**"
      - "data/**"
      - "requirements.txt"
      - "urls.txt"
      - "public/_headers"
      - "public/submit.html"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static site
        env:
          # Set the repository variable SITE_BASE_URL (e.g. https://maobidao.com)
          # to emit absolute canonical/OG/JSON-LD URLs. Leave unset to degrade gracefully.
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        run: python scripts/wechat_to_site.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public data urls.txt
          git diff --cached --quiet || git commit -m "Update archive site"
          git push
