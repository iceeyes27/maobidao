<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="未命名文章 的归档页，保留原文来源与抓取信息。">
  <title>未命名文章 - mp.weixin.qq.com - 公开文章归档</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main class="site">
    <article class="article">
      <p><a href="/">返回首页</a></p>
      <h1 class="site-title">未命名文章</h1>
      <div class="meta">
        <span class="meta-item"><span class="meta-key">抓取时间</span><span class="meta-value">2026-06-09 05:50:19</span></span>
        <span class="meta-item"><span class="meta-key">状态</span><span class="meta-value">抓取失败</span></span>
      </div>

      <div class="stats-inline">
        <span class="meta-item"><span class="meta-key">阅读量</span><span id="article-pv" class="meta-value">加载中...</span></span>
        <span id="article-stats-status" class="stats-status">正在准备统计...</span>
      </div>
      <div class="source-card">
        <strong>原文来源</strong>
        <span>站点：mp.weixin.qq.com</span>
        <a href="https://mp.weixin.qq.com/s/Yh223uTho8Xx27zgv3zCIQ" target="_blank" rel="noopener noreferrer">查看原文</a>
      </div>
      <div class="article-body">
<p class="result error">未找到微信公众号正文内容 #js_content</p>
      </div>
      <p class="links"><a href="https://mp.weixin.qq.com/s/Yh223uTho8Xx27zgv3zCIQ" target="_blank" rel="noopener noreferrer">查看原文链接</a></p>
    </article>
  </main>
    <script>
      const articlePv = document.querySelector("#article-pv");
      const articleStatsStatus = document.querySelector("#article-stats-status");

      function formatStatNumber(value) {
        const number = Number(value);
        return Number.isFinite(number) ? new Intl.NumberFormat("zh-CN").format(number) : "-";
      }

      function setArticleStatsStatus(message, isError = false) {
        if (!articleStatsStatus) {
          return;
        }
        articleStatsStatus.textContent = message;
        articleStatsStatus.className = isError ? "stats-status error" : "stats-status";
      }

      async function loadArticleStats() {
        try {
          setArticleStatsStatus("正在统计当前阅读...", false);
          const response = await fetch("/api/stats", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({page: "article", article_id: "6d494d044fd862b0282e81cc06a7dc3f"})
          });
          const text = await response.text();
          let data = {};
          try {
            data = text ? JSON.parse(text) : {};
          } catch {
            throw new Error(`统计接口没有返回 JSON，HTTP ${response.status}。`);
          }
          if (!response.ok || !data.success) {
            throw new Error(data.message || `统计失败，HTTP ${response.status}。`);
          }
          if (articlePv) {
            articlePv.textContent = formatStatNumber(data.article_pv);
          }
          setArticleStatsStatus(data.message || "已更新这篇文章的阅读量。", false);
        } catch (error) {
          if (articlePv) {
            articlePv.textContent = "加载失败";
          }
          setArticleStatsStatus(error.message || "阅读量加载失败，请稍后重试。", true);
        }
      }

      loadArticleStats();
    </script>
</body>
</html>
